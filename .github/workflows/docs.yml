name: Deploy docs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc tools
        run: pip install sphinx sphinx-conestack-theme mkdocs-material

      - name: Build Sphinx API docs
        run: PYTHONPATH=src sphinx-build sphinx sphinx/_build/html

      - name: Build MkDocs site
        run: |
          cd help-docs
          mkdocs build

      - name: Merge Sphinx output into MkDocs site
        run: cp -r sphinx/_build/html/. help-docs/site/developers/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: help-docs/site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
