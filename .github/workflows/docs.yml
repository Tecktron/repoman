name: Deploy docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc tools
        run: pip install sphinx furo mkdocs-material ghp-import

      - name: Build Sphinx API docs
        run: PYTHONPATH=src sphinx-build sphinx sphinx/_build/html

      - name: Build MkDocs site
        run: |
          cd help-docs
          mkdocs build

      - name: Merge Sphinx output into MkDocs site
        run: cp -r sphinx/_build/html help-docs/site/developers

      - name: Deploy to GitHub Pages
        run: ghp-import -n -p -f help-docs/site
