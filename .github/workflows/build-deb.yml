name: Build and attach .deb

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debhelper \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-setuptools

      - name: Build .deb
        run: dpkg-buildpackage -us -uc

      - name: Attach to release
        run: gh release upload "${{ github.ref_name }}" ../repoman_*.deb ../repoman_*.buildinfo ../repoman_*.changes
        env:
          GH_TOKEN: ${{ github.token }}
